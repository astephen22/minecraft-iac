---
- name: Configure Minecraft Server
  hosts: minecraft
  become: true

  vars:
    aws_region: "us-east-1"

    ecr_repo: "381492301020.dkr.ecr.us-east-1.amazonaws.com/minecraft-server"

    minecraft_image: "{{ ecr_repo }}:v1.0"

    bucket_name: "alex-minecraft-backups-12345"

    data_dir: "/data"

  tasks:

    ########################################
    # Install packages
    ########################################

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Install AWS CLI
      dnf:
        name: awscli
        state: present

    - name: Install pip
      dnf:
        name: python3-pip
        state: present

    ########################################
    # Start Docker
    ########################################

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    ########################################
    # Create data directory
    ########################################

    - name: Create Minecraft data directory
      file:
        path: "{{ data_dir }}"
        state: directory
        mode: '0775'
        owner: "1000"
        group: "1000"

    ########################################
    # Restore world from S3
    ########################################

    - name: Restore world data from S3
      shell: |
        aws s3 sync s3://{{ bucket_name }}/world {{ data_dir }} || true
      args:
        executable: /bin/bash

    ########################################
    # Fix permissions AFTER restore
    ########################################

    - name: Fix Minecraft data permissions
      file:
        path: "{{ data_dir }}"
        owner: "1000"
        group: "1000"
        mode: '0775'
        recurse: yes

    ########################################
    # Login to ECR
    ########################################

    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} \
        | docker login --username AWS --password-stdin {{ ecr_repo.split('/')[0] }}
      args:
        executable: /bin/bash

    ########################################
    # Pull image
    ########################################

    - name: Pull Minecraft image
      shell: |
        docker pull {{ minecraft_image }}

    ########################################
    # Remove existing container
    ########################################

    - name: Remove existing Minecraft container
      shell: |
        docker rm -f minecraft || true

    ########################################
    # Install k3s (Kubernetes)
    ########################################

    - name: Install k3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        executable: /bin/bash
      register: k3s_install
      changed_when: "'Installed' in k3s_install.stdout or k3s_install.rc == 0"

    ########################################
    # Ensure k3s is running
    ########################################

    - name: Enable and start k3s
      systemd:
        name: k3s
        state: started
        enabled: yes

    ########################################
    # Wait for k3s to be ready
    ########################################

    - name: Wait for k3s node to be ready
      shell: |
        kubectl get nodes
      register: k3s_status
      retries: 10
      delay: 10
      until: "'Ready' in k3s_status.stdout"

    ########################################
    # Verify k3s installation
    ########################################

    - name: Show k3s status
      shell: systemctl status k3s
      register: k3s_service

    - debug:
        var: k3s_service.stdout_lines

    ########################################
    # Start Minecraft container
    ########################################

    - name: Start Minecraft container
      shell: |
        docker run -d \
          --name minecraft \
          --restart unless-stopped \
          -p 25565:25565 \
          -v {{ data_dir }}:/data \
          -e EULA=TRUE \
          -e MEMORY=2G \
          -e TYPE=VANILLA \
          -e MOTD="Alex Stephen 934506588" \
          {{ minecraft_image }}

    ########################################
    # Wait for startup
    ########################################

    - name: Wait for Minecraft startup
      shell: |
        sleep 45

    ########################################
    # Show Minecraft logs
    ########################################

    - name: Show Minecraft logs
      shell: |
        docker logs minecraft --tail 50
      register: minecraft_logs

    - debug:
        var: minecraft_logs.stdout_lines
